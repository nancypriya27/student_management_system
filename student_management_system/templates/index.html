<!DOCTYPE html>
<html>

<head>

    <title>Student Record Management System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Student Record Management System</h1>

<form name="studentForm"
      action="/add"
      method="POST"
      onsubmit="return validateForm()">

    <input type="text"
           name="name"
           placeholder="Student Name"
           required>

    <input type="text"
           name="roll_no"
           placeholder="Roll Number"
           required>

    <input type="text"
           name="department"
           placeholder="Department"
           required>

    <input type="number"
           name="marks"
           placeholder="Marks"
           required>

    <button type="submit">
        Add Student
    </button>

</form>

<table>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Roll No</th>
        <th>Department</th>
        <th>Marks</th>
        <th>Action</th>
    </tr>

    {% for student in students %}

    <tr>

        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td>{{ student[4] }}</td>

        <td>
            <a href="/delete/{{ student[0] }}"
               onclick="return confirmDelete()">
               Delete
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
